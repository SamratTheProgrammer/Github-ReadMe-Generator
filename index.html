<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReadMeCraft - GitHub README Generator</title>
    <meta name="description" content="Generate professional GitHub README files with live preview and export.">
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/wotfard">
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
</head>

<body>
    <!-- ═══════════════ HEADER ═══════════════ -->
    <header id="app-header">
        <div class="header-left">
            <div class="logo">
                <svg width="30" height="30" viewBox="0 0 36 36" fill="none">
                    <rect width="36" height="36" rx="10" fill="url(#lg)" />
                    <path d="M10 12h16M10 18h11M10 24h8" stroke="#fff" stroke-width="2.4" stroke-linecap="round" />
                    <defs>
                        <linearGradient id="lg" x1="0" y1="0" x2="36" y2="36">
                            <stop stop-color="#3b82f6" />
                            <stop offset="1" stop-color="#06b6d4" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1>ReadMeCraft</h1>
        </div>
        <div class="header-center">
            <div class="mode-switch" id="mode-switch">
                <button class="mode-btn active" data-mode="project" id="mode-project-btn">📁 Project</button>
                <button class="mode-btn" data-mode="profile" id="mode-profile-btn">👤 Profile</button>
            </div>
        </div>
        <div class="header-right">
            <div class="select-wrap"><label for="template-select" title="Sections to include">Sections</label><select
                    id="template-select">
                    <option value="standard">Standard</option>
                    <option value="minimal">Minimal</option>
                    <option value="full">Full</option>
                </select></div>
            <div class="select-wrap"><label for="layout-select" title="Design Layout">Design</label><select
                    id="layout-select">
                    <option value="classic">Classic</option>
                    <option value="centered">Centered</option>
                    <option value="minimal">Minimal</option>
                </select></div>
            <div class="select-wrap"><label for="font-select">Font</label><select id="font-select">
                    <option value="default">Wotfard</option>
                    <option value="Inter">Inter</option>
                    <option value="Poppins">Poppins</option>
                    <option value="Space Grotesk">Space Grotesk</option>
                    <option value="Outfit">Outfit</option>
                </select></div>
            <div class="select-wrap"><label for="fontsize-select">Size</label><select id="fontsize-select">
                    <option value="medium">M</option>
                    <option value="small">S</option>
                    <option value="large">L</option>
                </select></div>
            <button id="theme-toggle" aria-label="Toggle theme">
                <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <circle cx="12" cy="12" r="5" />
                    <path
                        d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                </svg>
                <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z" />
                </svg>
            </button>
        </div>
    </header>

    <!-- ═══════════════ MAIN LAYOUT ═══════════════ -->
    <main id="app-main">
        <!-- SIDEBAR -->
        <aside id="sidebar">
            <div class="sidebar-inner">
                <div class="sidebar-section-title"
                    style="display:flex; justify-content:space-between; align-items:center; padding-right:16px;">
                    <span>Sections</span>
                    <button id="btn-close-sidebar" class="btn btn-ghost btn-sm" style="padding:0 4px;"
                        title="Close Sidebar">✕</button>
                </div>
                <nav id="section-nav"></nav>
                <button id="add-section-btn" class="btn btn-accent btn-sm">+ Add Section</button>
            </div>
            <div class="sidebar-completeness">
                <div class="sidebar-chart-title">Completeness</div>
                <div class="completeness-bar-wrap">
                    <div class="completeness-bar" id="completeness-bar"></div>
                </div>
                <div id="completeness-pct" class="completeness-pct">0%</div>
            </div>
        </aside>

        <!-- DRAG SPLITTER 1 -->
        <div class="splitter" id="splitter-left" title="Drag to resize"></div>

        <!-- EDITOR -->
        <section id="editor-panel">
            <div style="display:flex; justify-content:flex-end; margin-bottom: 10px;">
                <button id="btn-close-editor" class="btn btn-ghost btn-sm" style="padding:0 4px;"
                    title="Close Editor">✕</button>
            </div>
            <div id="editor-sections"></div>
            <div class="editor-nav-buttons">
                <button id="btn-prev-section" class="nav-btn nav-btn-prev" hidden>← Prev</button>
                <button id="btn-next-section" class="nav-btn nav-btn-next">Next →</button>
            </div>
        </section>

        <!-- DRAG SPLITTER 2 -->
        <div class="splitter" id="splitter-right" title="Drag to resize"></div>

        <!-- PREVIEW -->
        <section id="preview-panel">
            <div class="panel-header">
                <div class="preview-tabs">
                    <button class="preview-tab active" data-view="preview" id="tab-preview">👁️ Preview</button>
                    <button class="preview-tab" data-view="markdown" id="tab-markdown">📝 Markdown</button>
                    <select id="preview-theme-select" class="preview-theme-select" title="Preview Theme">
                        <option value="github-dark">GitHub Dark</option>
                        <option value="github-light">GitHub Light</option>
                        <option value="github-dimmed">GitHub Dimmed</option>
                    </select>
                </div>
                <div class="preview-actions">
                    <button id="btn-copy" class="btn btn-ghost btn-sm" title="Copy">📋 Copy</button>
                    <button id="btn-export-md" class="btn btn-primary btn-sm">.md</button>
                    <button id="btn-export-json" class="btn btn-secondary btn-sm">.json</button>
                    <button id="btn-close-preview" class="btn btn-ghost btn-sm" title="Close preview">✕</button>
                </div>
            </div>
            <div class="preview-body">
                <nav id="preview-toc" class="preview-toc"></nav>
                <div id="preview-content" class="markdown-body"></div>
                <pre id="markdown-raw" class="markdown-raw" hidden><code id="markdown-raw-code"></code></pre>
            </div>
        </section>
    </main>

    <!-- PREVIEW REOPEN BTN -->
    <button id="btn-reopen-preview" class="btn-reopen-preview" hidden title="Show preview">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
        </svg>
    </button>

    <button id="btn-reopen-sidebar" class="btn-reopen-left" style="top:40%;" hidden title="Show sidebar">📑</button>
    <button id="btn-reopen-editor" class="btn-reopen-left" style="top:50%;" hidden title="Show editor">✏️</button>

    <!-- MOBILE SIDEBAR TOGGLE -->
    <button id="mobile-sidebar-toggle" class="mobile-sidebar-toggle" aria-label="Toggle sidebar">☰</button>

    <!-- MOBILE TABS -->
    <div id="mobile-tabs" class="mobile-tabs">
        <button class="mobile-tab active" data-panel="editor">✏️ Editor</button>
        <button class="mobile-tab" data-panel="preview">👁️ Preview</button>
    </div>

    <!-- MODALS -->
    <div id="chart-modal" class="modal-overlay" hidden>
        <div class="modal-card">
            <div class="modal-header">
                <h2>Section Completeness</h2><button id="close-chart-modal"
                    class="btn btn-ghost btn-sm">&times;</button>
            </div>
            <div style="position: relative; height: 300px; width: 100%;">
                <canvas id="bar-chart"></canvas>
            </div>
        </div>
    </div>
    <div id="custom-section-modal" class="modal-overlay" hidden>
        <div class="modal-card modal-sm">
            <div class="modal-header">
                <h2>Add Custom Section</h2><button id="close-custom-modal" class="btn btn-ghost btn-sm">&times;</button>
            </div>
            <div class="modal-body"><label for="custom-section-name">Section Title</label><input
                    id="custom-section-name" type="text" placeholder="e.g. Roadmap…" class="input"></div>
            <div class="modal-footer"><button id="confirm-add-section" class="btn-lg btn-primary">Add Section</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast" hidden></div>
    <button id="open-chart-modal" class="fab" title="Chart">📊</button>

    <script src="app.js"></script>
</body>

</html>
